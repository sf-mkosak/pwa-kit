name: e2e_validate_generated_app
inputs:
  PROJECT_KEY:
    description: Project key to specify project to validate ("retail-app-demo", "retail-app-ext" or "retail-app-no-ext")
    required: true
    type: string

  TEMPLATE_VERSION:
    description: Version of the template to use for the project
    required: true
    type: string
runs:
  using: composite
  steps:
  - name: Validate generated project based on project-key
    run: node e2e/scripts/validate-generated-project.js ${{ inputs.PROJECT_KEY }} ${{ inputs.TEMPLATE_VERSION }}
    shell: bash
