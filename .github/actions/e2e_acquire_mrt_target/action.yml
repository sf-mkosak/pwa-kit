name: e2e_acquire_mrt_target
description: Acquire MRT Target from pool of available targets in the MRT staging org.
inputs:
    BRANCH:
        description: 'GitHub branch name from workflow invoking this action'
        required: false
    RUN_ID:
        description: 'GitHub workflow run ID from workflow invoking this action'
        required: true
    PR_NUMBER:
        description: 'GitHub PR number from workflow invoking this action'
        required: false
    MAX_RETRIES:
        description: 'Maximum retry attempts'
        required: false
        default: '3'
    RETRY_DELAY:
        description: 'Delay between retries in milliseconds'
        required: false
        default: '10000'
outputs:
    mrt_env_id:
        description: 'The MRT environment ID that was acquired'
    mrt_env_url:
        description: 'The MRT environment URL'
    status:
        description: 'The status of the acquisition (success/error)'
runs:
    using: composite
    steps:
        - name: Acquire MRT Target
          id: acquire_mrt_target
          shell: bash
          run: |-
              set -e
              node e2e/scripts/mrt-target-manager.js acquire --branch ${{inputs.BRANCH}} --run-id ${{inputs.RUN_ID}} --pr-number ${{inputs.PR_NUMBER}} --max-retries ${{inputs.MAX_RETRIES}} --retry-delay ${{inputs.RETRY_DELAY}}
        - name: Echo MRT Target Outputs
          shell: bash
          run: |
              echo "MRT Environment ID: ${{ steps.acquire_mrt_target.outputs.mrt_env_id }}"
              echo "MRT Environment URL: ${{ steps.acquire_mrt_target.outputs.mrt_env_url }}"
              echo "Status: ${{ steps.acquire_mrt_target.outputs.status }}"
