# This is a config for verdaccio, a private NPM repository you can run yourself.
# The repository is unsecured and only intended to be run locally - don't expose
# it on the internet.

storage: ./storage

auth:
  htpasswd:
    file: ./htpasswd

uplinks:
  npmjs:
    url: https://registry.npmjs.org/
    max_fails: 100
    cache: false

# Allow anybody to publish any package, with no auth.
# Monorepo packages must not proxy to npmjs so that locally published
# versions always take precedence (lerna skips publish if the version
# already exists on the upstream registry).
packages:
  '@salesforce/pwa-kit-*':
    access: $all
    publish: $all

  '@salesforce/retail-react-app':
    access: $all
    publish: $all

  '@salesforce/commerce-sdk-react':
    access: $all
    publish: $all

  '@*/*':
    access: $all
    publish: $all
    proxy: npmjs

  '**':
    access: $all
    publish: $all
    proxy: npmjs

publish:
  allow_offline: true

logs:
  - {type: stdout, path: ./verdaccio.log, level: warn}
